    <div class="main">
        <div class="container">
            <div class="ten">
                <h1>ĐĂNG NHẬP</h1>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email hoặc Tên Đăng Nhập</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Nhập email của bạn"
                        required
                    >
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Mật Khẩu</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Nhập mật khẩu"
                        required
                    >
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="remember" id="remember">
                        Ghi nhớ tôi
                    </label>
                    <a href="./khoiphuctk.html">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <div class="btn-login-content">
                        <div class="loader" id="loader"></div>
                        <span id="btnText">Đăng Nhập</span>
                    </div>
                </button>

                <div class="success-message" id="successMessage">Đăng nhập thành công!</div>
            </form>

            <div class="signup-link">
                Chưa có tài khoản? <a href="./dangky.html">Đăng ký ngay</a>
            </div>
        </div>
    </div>
